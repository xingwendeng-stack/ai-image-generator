<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 图片生成器</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #07080b;
      color: #e8eaed;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow-x: hidden;
    }

    /* ===== Animated Background ===== */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(124, 92, 252, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(91, 141, 239, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(52, 211, 153, 0.04) 0%, transparent 50%);
      z-index: 0;
      animation: bgShift 20s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(2%, 1%) rotate(3deg); }
    }

    /* ===== Floating Orbs ===== */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      z-index: 0;
      pointer-events: none;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: #7c5cfc;
      top: -100px; right: -100px;
      animation-delay: 0s;
    }
    .orb-2 {
      width: 300px; height: 300px;
      background: #34d399;
      bottom: -50px; left: -80px;
      animation-delay: -4s;
    }
    .orb-3 {
      width: 250px; height: 250px;
      background: #60a5fa;
      bottom: 30%; right: -60px;
      animation-delay: -8s;
    }

    @keyframes orbFloat {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(30px, -30px) scale(1.1); }
    }

    /* ===== Header ===== */
    header {
      text-align: center;
      padding: 56px 20px 12px;
      width: 100%;
      position: relative;
      z-index: 1;
    }

    header .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }

    header .logo-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      background: linear-gradient(135deg, #7c5cfc, #5b8def);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 8px 32px rgba(124, 92, 252, 0.3);
    }

    header h1 {
      font-size: 38px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #c4b5fd, #93c5fd, #6ee7b7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: #6b7280;
      margin-top: 8px;
      font-size: 15px;
      font-weight: 400;
    }

    /* ===== Main Container ===== */
    .container {
      width: 100%;
      max-width: 920px;
      padding: 0 20px 60px;
      position: relative;
      z-index: 1;
    }

    /* ===== Input Area ===== */
    .input-area {
      background: rgba(21, 24, 30, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(37, 40, 48, 0.6);
      border-radius: 20px;
      padding: 28px;
      margin-top: 28px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .input-area:focus-within {
      border-color: rgba(124, 92, 252, 0.4);
      box-shadow: 0 0 40px rgba(124, 92, 252, 0.06);
    }

    .input-area label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #9ca3af;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .input-row {
      display: flex;
      gap: 12px;
    }

    .input-row input {
      flex: 1;
      padding: 16px 20px;
      border-radius: 14px;
      border: 1px solid #2a2d35;
      background: #1c1f26;
      color: #e8eaed;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s, background 0.25s;
    }

    .input-row input::placeholder {
      color: #4b5563;
    }

    .input-row input:focus {
      border-color: #7c5cfc;
      background: #20232b;
    }

    .input-row button {
      padding: 16px 36px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #7c5cfc, #5b8def);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.25s;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .input-row button::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.08));
      pointer-events: none;
    }

    .input-row button:hover {
      opacity: 0.92;
      box-shadow: 0 8px 32px rgba(124, 92, 252, 0.35);
      transform: translateY(-1px);
    }

    .input-row button:active {
      transform: scale(0.97);
    }

    .input-row button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    /* ===== Status Bar ===== */
    .status-bar {
      margin-top: 14px;
      font-size: 13px;
      min-height: 20px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .status-bar .hint { color: #6b7280; }
    .status-bar .error { color: #f87171; }
    .status-bar .info  { color: #60a5fa; }
    .status-bar .success { color: #34d399; }

    /* ===== Preset Prompts ===== */
    .presets {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(37, 40, 48, 0.5);
    }

    .presets-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .presets-header span {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #6b7280;
    }

    .presets-header .refresh-btn {
      background: none;
      border: none;
      color: #4b5563;
      cursor: pointer;
      font-size: 14px;
      padding: 2px 8px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    .presets-header .refresh-btn:hover {
      color: #9ca3af;
      background: rgba(255,255,255,0.04);
    }

    .preset-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .preset-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      border: 1px solid rgba(37, 40, 48, 0.6);
      background: rgba(28, 31, 38, 0.5);
      color: #9ca3af;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.25s;
      white-space: nowrap;
    }

    .preset-chip:hover {
      border-color: rgba(124, 92, 252, 0.4);
      background: rgba(124, 92, 252, 0.08);
      color: #d1d5db;
      transform: translateY(-1px);
    }

    .preset-chip:active {
      transform: scale(0.96);
    }

    .preset-chip .chip-icon {
      font-size: 14px;
      line-height: 1;
    }

    /* ===== Loading ===== */
    .loading {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 60px 0;
    }

    .loading.active {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    .spinner-wrapper {
      position: relative;
      width: 56px;
      height: 56px;
    }

    .spinner {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #7c5cfc;
      border-right-color: #5b8def;
      animation: spin 0.8s linear infinite;
    }

    .spinner-inner {
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-bottom-color: #34d399;
      border-left-color: #34d399;
      animation: spin 1.2s linear infinite reverse;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading p {
      margin-top: 20px;
      color: #6b7280;
      font-size: 14px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ===== Results Title Row ===== */
    .results-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .results-header h2 {
      font-size: 16px;
      font-weight: 600;
      color: #d1d5db;
    }

    .results-header .regenerate-btn {
      font-size: 13px;
      color: #7c5cfc;
      background: none;
      border: none;
      font-family: inherit;
      cursor: pointer;
      padding: 6px 14px;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .results-header .regenerate-btn:hover {
      background: rgba(124, 92, 252, 0.1);
    }

    /* ===== Image Grid ===== */
    .results {
      display: none;
      margin-top: 32px;
    }

    .results.active {
      display: block;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: rgba(21, 24, 30, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(37, 40, 48, 0.5);
      border-radius: 18px;
      overflow: hidden;
      transition: all 0.3s;
    }

    .card:hover {
      border-color: rgba(124, 92, 252, 0.25);
      transform: translateY(-2px);
      box-shadow: 0 12px 48px rgba(0, 0, 0, 0.3);
    }

    .card .img-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #1c1f26;
      overflow: hidden;
    }

    .card .img-wrapper::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 60%, rgba(0,0,0,0.3));
      z-index: 1;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .card:hover .img-wrapper::before {
      opacity: 1;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s;
    }

    .card:hover img {
      transform: scale(1.03);
    }

    .card .img-wrapper .img-loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1c1f26;
      color: #4b5563;
      font-size: 13px;
      transition: opacity 0.3s;
    }
    .card .img-wrapper .img-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .card .card-footer {
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card .card-footer .badge {
      font-size: 12px;
      color: #6b7280;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .card .card-footer .badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .card .card-footer .badge .dot-1 { background: #7c5cfc; }
    .card .card-footer .badge .dot-2 { background: #34d399; }

    .card .card-footer .download-btn {
      font-size: 12px;
      color: #7c5cfc;
      text-decoration: none;
      font-weight: 500;
      padding: 6px 14px;
      border-radius: 8px;
      transition: background 0.2s, color 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .card .card-footer .download-btn:hover {
      background: rgba(124, 92, 252, 0.12);
      color: #a78bfa;
    }

    /* ===== Empty State ===== */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 70px 20px 50px;
      color: #374151;
      text-align: center;
    }

    .empty-state .icon-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      background: rgba(21, 24, 30, 0.6);
      border: 1px solid rgba(37, 40, 48, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin-bottom: 20px;
      transition: border-color 0.3s, transform 0.3s;
    }

    .empty-state .icon-wrapper:hover {
      border-color: rgba(124, 92, 252, 0.2);
      transform: scale(1.05);
    }

    .empty-state p {
      font-size: 14px;
      color: #4b5563;
      line-height: 1.6;
    }

    .empty-state .sub {
      font-size: 12px;
      color: #374151;
      margin-top: 4px;
    }

    /* ===== Toast ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(21, 24, 30, 0.95);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(37, 40, 48, 0.6);
      color: #e8eaed;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 13px;
      font-family: inherit;
      z-index: 100;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
      display: flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ===== Section Divider ===== */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #374151;
      font-size: 12px;
      margin: 36px 0 4px;
    }
    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(37, 40, 48, 0.4);
    }

    /* ===== Responsive ===== */
    @media (max-width: 640px) {
      header { padding-top: 36px; }
      header h1 { font-size: 28px; }
      header p { font-size: 13px; }

      .input-area { padding: 20px; border-radius: 16px; margin-top: 16px; }
      .input-row { flex-direction: column; }
      .input-row button { width: 100%; padding: 14px; }
      .grid { grid-template-columns: 1fr; }

      .orb-1 { width: 200px; height: 200px; }
      .orb-2 { width: 150px; height: 150px; }

      .preset-chip { font-size: 12px; padding: 6px 12px; }

      .toast {
        white-space: normal;
        max-width: calc(100vw - 40px);
        text-align: center;
      }
    }
  </style>
</head>
<body>

  <!-- Floating Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <header>
    <div class="logo">
      <div class="logo-icon">✨</div>
      <h1>AI 图片生成器</h1>
    </div>
    <p>输入一段描述，AI 为你生成两张惊艳的图片</p>
  </header>

  <div class="container">
    <!-- ===== Input Area ===== -->
    <div class="input-area">
      <label for="prompt">✏️ 图片描述</label>
      <div class="input-row">
        <input
          id="prompt"
          type="text"
          placeholder="例如：一只穿着宇航服的猫在火星上散步，写实风格"
          autocomplete="off"
        />
        <button id="generateBtn">✨ 生成图片</button>
      </div>
      <div class="status-bar" id="statusBar">
        <span class="hint">💡 试试从下方预设文案中选择，或输入你的创意</span>
      </div>

      <!-- ===== Preset Prompts ===== -->
      <div class="presets">
        <div class="presets-header">
          <span>🎯 快速开始 — 点击文案直接生成</span>
          <button class="refresh-btn" id="shuffleBtn" title="换一批">🔄 换一批</button>
        </div>
        <div class="preset-grid" id="presetGrid"></div>
      </div>
    </div>

    <!-- ===== Loading ===== -->
    <div class="loading" id="loading">
      <div class="spinner-wrapper">
        <div class="spinner"></div>
        <div class="spinner-inner"></div>
      </div>
      <p>AI 正在创作中，请稍候...</p>
    </div>

    <!-- ===== Results ===== -->
    <div class="results" id="results">
      <div class="results-header">
        <h2>🖼️ 生成的图片</h2>
        <button class="regenerate-btn" id="regenerateBtn">🔄 重新生成</button>
      </div>
      <div class="grid" id="imageGrid">
        <div class="card">
          <div class="img-wrapper">
            <div class="img-loader" id="loader0">加载中...</div>
            <img id="img0" alt="生成的图片 1" />
          </div>
          <div class="card-footer">
            <span class="badge"><span class="dot dot-1"></span> 图片 #1</span>
            <a class="download-btn" id="download0" download="ai-image-1.png" target="_blank">⬇ 下载</a>
          </div>
        </div>
        <div class="card">
          <div class="img-wrapper">
            <div class="img-loader" id="loader1">加载中...</div>
            <img id="img1" alt="生成的图片 2" />
          </div>
          <div class="card-footer">
            <span class="badge"><span class="dot dot-2"></span> 图片 #2</span>
            <a class="download-btn" id="download1" download="ai-image-2.png" target="_blank">⬇ 下载</a>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== Empty State ===== -->
    <div class="empty-state" id="emptyState">
      <div class="icon-wrapper">🎨</div>
      <p>输入一段描述，点击生成</p>
      <p class="sub">或从下方预设文案中选择</p>
    </div>
  </div>

  <script>
    // ===== Preset Prompts =====
    const ALL_PRESETS = [
      // 科幻奇幻

      { icon: '🏔️', text: '雪山倒映在平静的湖面，日出，超写实摄影' },

      // 艺术风格
      { icon: '🎨', text: '梵高星月夜风格的海景，油画笔触' },
      { icon: '🖌️', text: '水墨画风格的山水，飞鸟，日出，留白' },
      { icon: '🎭', text: '复古胶片风格的街拍，欧洲小镇，暖色调' },
      { icon: '✏️', text: '铅笔素描风格的少女肖像，细腻' },
      { icon: '🎪', text: '波普艺术风格的猫，安迪·沃霍尔风格' },
      { icon: '🏺', text: '古希腊风格的陶罐绘画，红绘技法' },
      { icon: '🌸', text: '浮世绘风格的海浪，葛饰北斋风格' },

      // 建筑与城市
      { icon: '🏛️', text: '未来主义的图书馆，巨大的玻璃穹顶，概念艺术' },

      { icon: '🗼', text: '巴黎埃菲尔铁塔在樱花中，浪漫印象派' },

      { icon: '🏠', text: '霍比特风格的洞穴小屋建在山坡上，花园环绕' },

      // 另类创意
      { icon: '🍣', text: '寿司做成的城市街景，食物艺术' },
      { icon: '🎮', text: '8-bit像素风格的中世纪城堡和巨龙' },
      { icon: '🧸', text: '巨大的毛绒玩具占领城市，超现实' },
      { icon: '🍄', text: '发光的巨大蘑菇森林，外星生态' },

      { icon: '🧊', text: '水晶宫殿建在冰川之上，极光天空' },
      { icon: '🎠', text: '废弃的游乐园，旋转木马，藤蔓覆盖' },
      { icon: '🌋', text: '火山喷发时冲浪的人，极限运动，震撼' },
    ];

    const PRESETS_PER_PAGE = 12;

    let currentPresets = [];
    let currentPrompt = '';

    function shufflePresets() {
      const shuffled = [...ALL_PRESETS].sort(() => Math.random() - 0.5);
      currentPresets = shuffled.slice(0, PRESETS_PER_PAGE);
      renderPresets();
    }

    function renderPresets() {
      const grid = document.getElementById('presetGrid');
      grid.innerHTML = currentPresets.map(p =>
        `<button class="preset-chip" data-prompt="${escapeHtml(p.text)}">
          <span class="chip-icon">${p.icon}</span>
          ${escapeHtml(p.text)}
        </button>`
      ).join('');
    }

    // Simple escape for HTML attributes
    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ===== Toast =====
    let toastTimer;

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
    }

    // ===== DOM Refs =====
    const promptInput = document.getElementById('prompt');
    const generateBtn = document.getElementById('generateBtn');
    const statusBar = document.getElementById('statusBar');
    const loading = document.getElementById('loading');
    const results = document.getElementById('results');
    const emptyState = document.getElementById('emptyState');
    const imageGrid = document.getElementById('imageGrid');

    function setStatus(text, type = 'hint') {
      statusBar.innerHTML = `<span class="${type}">${text}</span>`;
    }

    function showLoading(show) {
      loading.classList.toggle('active', show);
      if (show) {
        results.classList.remove('active');
        emptyState.style.display = 'none';
      }
    }

    function displayImages(urls) {
      results.classList.add('active');
      emptyState.style.display = 'none';

      urls.forEach((url, i) => {
        const img = document.getElementById(`img${i}`);
        const link = document.getElementById(`download${i}`);
        const loader = document.getElementById(`loader${i}`);

        loader.classList.remove('hidden');
        img.src = '';

        setTimeout(() => {
          img.src = url;
          img.onload = () => loader.classList.add('hidden');
          img.onerror = () => {
            loader.textContent = '❌ 加载失败';
            img.style.display = 'none';
          };
        }, 100);

        link.href = url;
      });
    }

    // ===== Helper: parse response safely =====
    async function parseResponse(res) {
      const text = await res.text();
      if (!text) return null; // empty body
      try {
        return JSON.parse(text);
      } catch (e) {
        // not JSON
        return { __raw_text: text };
      }
    }

    async function generate(promptOverride) {
      const prompt = promptOverride || promptInput.value.trim();
      if (!prompt) {
        setStatus('⚠️ 请先输入图片描述', 'error');
        promptInput.focus();
        return;
      }

      if (!promptOverride) {
        currentPrompt = prompt;
      }

      generateBtn.disabled = true;
      document.getElementById('regenerateBtn').disabled = true;
      showLoading(true);
      setStatus('🚀 正在生成中...', 'info');

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });

        // 先读取为 text，再尝试解析为 JSON，避免 res.json() 在空响应或非 JSON 时抛错
        const data = await parseResponse(res);

        if (!res.ok) {
          // 提取错误信息：优先 data.error/data.detail，其次 raw text
          const msg = (data && (data.error || data.detail)) || (data && data.__raw_text) || `服务器返回错误 (${res.status})`;
          throw new Error(msg);
        }

        if (!data || !data.images || data.images.length === 0) {
          throw new Error('未获取到图片');
        }

        displayImages(data.images);
        setStatus(`✅ 生成成功！共 ${data.images.length} 张图片`, 'success');
      } catch (err) {
        console.error(err);
        setStatus(`❌ ${err.message}`, 'error');
        results.classList.remove('active');
        emptyState.style.display = '';
      } finally {
        generateBtn.disabled = false;
        document.getElementById('regenerateBtn').disabled = false;
        showLoading(false);
      }
    }

    // ===== Event Listeners =====
    generateBtn.addEventListener('click', () => generate());

    promptInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') generate();
    });

    // Preset chip click
    document.getElementById('presetGrid').addEventListener('click', (e) => {
      const chip = e.target.closest('.preset-chip');
      if (!chip) return;
      const prompt = chip.dataset.prompt;
      promptInput.value = prompt;
      generate(prompt);
    });

    // Shuffle presets
    document.getElementById('shuffleBtn').addEventListener('click', () => {
      shufflePresets();
      showToast('🔄 已换一批文案');
    });

    // Regenerate
    document.getElementById('regenerateBtn').addEventListener('click', () => {
      if (currentPrompt) generate(currentPrompt);
    });

    // ===== Init =====
    shufflePresets();
  </script>
